# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/
---
version: 2
run:
  # Timeout for analysis
  timeout: 5m
  # Exit code when at least one issue was found
  issues-exit-code: 1
  # Include test files
  tests: true
  # Which dirs to skip
  skip-dirs:
    - vendor
    - testdata
    - .github
  # Which files to skip
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
  # Allow multiple parallel golangci-lint instances
  allow-parallel-runners: true
linters:
  # Disable all linters by default
  disable-all: true
  # Enable specific linters
  enable:
    # Bugs and correctness
    - errcheck # Checks for unchecked errors
    - gosimple # Simplify code
    - govet # Go vet
    - ineffassign # Detects ineffectual assignments
    - staticcheck # Advanced Go linting
    - typecheck # Type checking
    - unused # Checks for unused code
    # Code quality
    - gocyclo # Cyclomatic complexity
    - gofmt # Code formatting
    - goimports # Check imports
    - misspell # Spelling mistakes
    - revive # Drop-in replacement for golint
    - unparam # Unused function parameters
    # Performance
    - prealloc # Finds slice declarations that could be preallocated
    # Style
    - gocritic # Go code critique
    - godot # Check comments end in period
    - whitespace # Whitespace issues
    # Complexity
    - funlen # Function length
    - gocognit # Cognitive complexity
    # Error handling
    - errchkjson # Checks for unchecked json.Marshal errors
    - errorlint # Error wrapping
    # Security
    - gosec # Security issues
    # Bugs
    - bodyclose # Checks HTTP response body is closed
    - nilerr # Finds code that returns nil even if error is not nil
    - rowserrcheck # Checks for err assignment in rows.Err()
    - sqlclosecheck # Checks SQL rows/statements are closed
linters-settings:
  errcheck:
    # Report about not checking errors in type assertions
    check-type-assertions: true
    # Report about assignment of errors to blank identifier
    check-blank: true
  govet:
    # Enable all analyzers
    enable-all: true
    # Disable specific analyzers
    disable:
      - shadow # Too noisy for now
  gocyclo:
    # Minimal cyclomatic complexity to report
    min-complexity: 15
  funlen:
    # Maximum function length
    lines: 100
    statements: 50
  gocognit:
    # Minimal cognitive complexity to report
    min-complexity: 20
  gocritic:
    # Enable multiple checks by tags
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
  godot:
    # Check all top-level comments
    scope: toplevel
    # Exclude from checking
    exclude:
      - "^fixme:"
      - "^todo:"
  misspell:
    # Locale for spell checking
    locale: US
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
  gosec:
    # Select which checks to enable
    includes:
      - G101 # Look for hardcoded credentials
      - G102 # Bind to all interfaces
      - G103 # Audit unsafe block usage
      - G104 # Audit errors not checked
      - G106 # Audit use of ssh.InsecureIgnoreHostKey
      - G107 # Url provided to HTTP request as taint input
      - G108 # Profiling endpoint automatically exposed on /debug/pprof
      - G109 # Potential Integer overflow
      - G110 # Potential DoS vulnerability via decompression bomb
      - G201 # SQL query construction using format string
      - G202 # SQL query construction using string concatenation
      - G203 # Use of unescaped data in HTML templates
      - G204 # Audit use of command execution
      - G301 # Poor file permissions used when creating a directory
      - G302 # Poor file permissions used when creation file or using chmod
      - G303 # Creating tempfile using a predictable path
      - G304 # File path provided as taint input
      - G305 # File traversal when extracting zip archive
      - G306 # Poor file permissions used when writing to a new file
      - G307 # Deferring a method which returns an error
      - G401 # Detect the usage of DES, RC4, MD5 or SHA1
      - G402 # Look for bad TLS connection settings
      - G403 # Ensure minimum RSA key length of 2048 bits
      - G404 # Insecure random number source (rand)
      - G501 # Import blocklist: crypto/md5
      - G502 # Import blocklist: crypto/des
      - G503 # Import blocklist: crypto/rc4
      - G504 # Import blocklist: net/http/cgi
      - G505 # Import blocklist: crypto/sha1
      - G601 # Implicit memory aliasing of items from a range statement
issues:
  # Maximum issues count per one linter
  max-issues-per-linter: 0
  # Maximum count of issues with the same text
  max-same-issues: 0
  # Show only new issues
  new: false
  # Fix found issues (if supported by linter)
  fix: false
  # Exclude specific issues
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - funlen
        - gocognit
    # Exclude specific issues in integration tests
    - path: integration/
      linters:
        - funlen
        - gocognit
    # Exclude known issues
    - text: "weak cryptographic primitive"
      linters:
        - gosec
    # Exclude some staticcheck messages
    - linters:
        - staticcheck
      text: "SA9003:"
    # Exclude lll issues for long lines with go:generate
    - linters:
        - lll
      source: "^//go:generate "
  # Independently from option `exclude` we use default exclude patterns
  exclude-use-default: false
output:
  # Format: colored-line-number|line-number|json|tab|checkstyle|code-climate|junit-xml|github-actions
  format: colored-line-number
  # Print lines of code with issue
  print-issued-lines: true
  # Print linter name in the end of issue text
  print-linter-name: true
  # Make issues output unique by line
  uniq-by-line: true
  # Sort results by: filepath, line and column
  sort-results: true
