name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  GO_VERSION: '1.23.0'

jobs:
  # ===========================================================================
  # Create GitHub Release with Multi-Platform Binaries
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: go test -v ./...

      - name: Build binaries for all platforms
        run: |
          mkdir -p dist

          # Linux AMD64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/sorttf-linux-amd64 \
            ./cmd/sorttf

          # Linux ARM64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/sorttf-linux-arm64 \
            ./cmd/sorttf

          # macOS AMD64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/sorttf-darwin-amd64 \
            ./cmd/sorttf

          # macOS ARM64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/sorttf-darwin-arm64 \
            ./cmd/sorttf

          # Windows AMD64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/sorttf-windows-amd64.exe \
            ./cmd/sorttf

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.version.outputs.VERSION }}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release"
            NOTES="Initial release of sortTF"
          else
            echo "Generating changelog from $PREV_TAG to ${{ steps.version.outputs.VERSION }}"
            NOTES=$(git log --pretty=format:"- %s" $PREV_TAG..${{ steps.version.outputs.VERSION }})
          fi

          # Save to file for multiline support
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            dist/sorttf-linux-amd64
            dist/sorttf-linux-arm64
            dist/sorttf-darwin-amd64
            dist/sorttf-darwin-arm64
            dist/sorttf-windows-amd64.exe
            dist/checksums.txt
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-rc') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-alpha') }}
          generate_release_notes: true
