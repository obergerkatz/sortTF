---
name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
permissions:
  contents: write
env:
  GO_VERSION: '1.25.8'
jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"
      - name: Validate version format
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+\.[0-9]+)?$ ]]; then
            echo "❌ Error: Invalid version format: $VERSION"
            echo "Expected: vX.Y.Z or vX.Y.Z-prerelease.N"
            exit 1
          fi
          echo "✅ Version format valid"
      - name: Check if pre-release
        id: check_prerelease
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "🔶 Pre-release detected"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "✅ Stable release"
          fi
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: go test -race -v ./...
      - name: Run integration tests
        run: go test -v ./integration/...
      - name: Verify build
        run: go build -v ./cmd/sorttf
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binaries for all platforms
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist

          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMIT_SHA="${GITHUB_SHA}"

          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT_SHA} -X main.date=${BUILD_DATE}"

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o dist/sorttf-linux-amd64 ./cmd/sorttf
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o dist/sorttf-linux-arm64 ./cmd/sorttf
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o dist/sorttf-darwin-amd64 ./cmd/sorttf
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o dist/sorttf-darwin-arm64 ./cmd/sorttf
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o dist/sorttf-windows-amd64.exe ./cmd/sorttf

          echo "✅ Built binaries for 5 platforms"
      - name: Create checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./sorttf-* > checksums.txt
          echo "📝 Checksums:"
          cat checksums.txt
      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          # Find the previous tag (latest tag excluding the current version)
          # Use process substitution to avoid SIGPIPE errors
          PREV_TAG=""
          if git tag --sort=-version:refname | grep -v "^${VERSION}$" > /tmp/tags.txt 2>/dev/null; then
            PREV_TAG="$(head -n 1 /tmp/tags.txt || true)"
          fi

          echo "Current version: $VERSION"
          echo "Previous tag: ${PREV_TAG:-none}"

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_LINK="https://github.com/obergerkatz/sortTF/compare/${PREV_TAG}...${VERSION}"
          else
            CHANGELOG_LINK="https://github.com/obergerkatz/sortTF/releases/tag/${VERSION}"
          fi

          # Generate changelog content
          CHANGELOG_FILE="/tmp/changelog.md"
          {
            echo "## 🚀 What's Changed"
            echo ""

            if [ -z "$PREV_TAG" ]; then
              echo "Initial release of sortTF - a tool for sorting and formatting Terraform files."
              echo ""
              echo "### ✨ Features"
              # Save git log output to file to avoid SIGPIPE
              git log --pretty=format:"- %s" --reverse > /tmp/commits.txt || true
              head -n 20 /tmp/commits.txt || true
            else
              echo "Changes since ${PREV_TAG}:"
              echo ""
              # Generate commit list, filter merges, handle empty result
              if git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" > /tmp/commits.txt 2>/dev/null; then
                grep -v "^- Merge" /tmp/commits.txt || echo "- Bug fixes and improvements"
              else
                echo "- Bug fixes and improvements"
              fi
            fi

            echo ""
            echo ""
            echo "## 📥 Installation"
            echo ""
            echo "### Using go install"
            echo '```bash'
            echo "go install github.com/obergerkatz/sortTF/cmd/sorttf@${VERSION}"
            echo '```'
            echo ""
            echo "### Download Binary"
            echo "Download the appropriate binary for your platform from the assets below."
            echo ""
            echo "#### Linux"
            echo '```bash'
            echo "# AMD64"
            echo "wget https://github.com/obergerkatz/sortTF/releases/download/${VERSION}/sorttf-linux-amd64"
            echo "chmod +x sorttf-linux-amd64"
            echo "sudo mv sorttf-linux-amd64 /usr/local/bin/sorttf"
            echo ""
            echo "# ARM64"
            echo "wget https://github.com/obergerkatz/sortTF/releases/download/${VERSION}/sorttf-linux-arm64"
            echo "chmod +x sorttf-linux-arm64"
            echo "sudo mv sorttf-linux-arm64 /usr/local/bin/sorttf"
            echo '```'
            echo ""
            echo "#### macOS"
            echo '```bash'
            echo "# Intel"
            echo "wget https://github.com/obergerkatz/sortTF/releases/download/${VERSION}/sorttf-darwin-amd64"
            echo "chmod +x sorttf-darwin-amd64"
            echo "sudo mv sorttf-darwin-amd64 /usr/local/bin/sorttf"
            echo ""
            echo "# Apple Silicon"
            echo "wget https://github.com/obergerkatz/sortTF/releases/download/${VERSION}/sorttf-darwin-arm64"
            echo "chmod +x sorttf-darwin-arm64"
            echo "sudo mv sorttf-darwin-arm64 /usr/local/bin/sorttf"
            echo '```'
            echo ""
            echo "#### Windows"
            echo '```powershell'
            echo "# Download sorttf-windows-amd64.exe and add to PATH"
            echo '```'
            echo ""
            echo "## 🔐 Verification"
            echo ""
            echo "Verify the integrity of downloaded binaries using checksums:"
            echo '```bash'
            echo "# Download checksums file"
            echo "wget https://github.com/obergerkatz/sortTF/releases/download/${VERSION}/checksums.txt"
            echo ""
            echo "# Verify (Linux/macOS)"
            echo "sha256sum -c checksums.txt"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "_Built with Go ${{ env.GO_VERSION }} • [Full Changelog](${CHANGELOG_LINK})_"
          } > "$CHANGELOG_FILE"

          # Write changelog to GitHub output using heredoc
          {
            echo "changelog<<EOF"
            cat "$CHANGELOG_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Cleanup temp files
          rm -f /tmp/tags.txt /tmp/commits.txt /tmp/changelog.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: ${{ needs.validate.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' || github.event.inputs.prerelease || false }}
          files: |
            dist/sorttf-linux-amd64
            dist/sorttf-linux-arm64
            dist/sorttf-darwin-amd64
            dist/sorttf-darwin-arm64
            dist/sorttf-windows-amd64.exe
            dist/checksums.txt
          generate_release_notes: true
          make_latest: ${{ needs.validate.outputs.is_prerelease == 'false' }}
      - name: Release summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          IS_PRERELEASE: ${{ needs.validate.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          echo "## 🎉 Release Summary"
          echo ""
          echo "**Version:** $VERSION"
          echo "**Type:** $([ "$IS_PRERELEASE" = "true" ] && echo "Pre-release 🔶" || echo "Stable ✅")"
          echo ""
          echo "### 📦 Artifacts"
          echo "- Linux (amd64, arm64)"
          echo "- macOS (Intel, Apple Silicon)"
          echo "- Windows (amd64)"
          echo "- Checksums (SHA256)"
          echo ""
          echo "### 🔗 Links"
          echo "- Release: https://github.com/${{ github.repository }}/releases/tag/$VERSION"
          echo "- Install: \`go install github.com/${{ github.repository }}/cmd/sorttf@$VERSION\`"
          echo ""
          echo "✅ Release completed successfully!"
